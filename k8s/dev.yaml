apiVersion: apps/v1
kind: Deployment
metadata:
  name: exam-app-dev
  labels:
    app: exam-app
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exam-app
      env: dev
  template:
    metadata:
      labels:
        app: exam-app
        env: dev
    spec:
      containers:
      - name: app
        image: DOCKER_USERNAME/exam-app:develop
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: exam-app-dev-service
spec:
  type: NodePort
  selector:
    app: exam-app
    env: dev
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 8002 

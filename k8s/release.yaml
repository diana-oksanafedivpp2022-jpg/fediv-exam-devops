apiVersion: apps/v1
kind: Deployment
metadata:
  name: exam-app-release
  labels:
    app: exam-app
    env: release
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exam-app
      env: release
  template:
    metadata:
      labels:
        app: exam-app
        env: release
    spec:
      containers:
      - name: app
        image: DOCKER_USERNAME/exam-app:1.0.0
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: exam-app-release-service
spec:
  type: NodePort
  selector:
    app: exam-app
    env: release
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 8003

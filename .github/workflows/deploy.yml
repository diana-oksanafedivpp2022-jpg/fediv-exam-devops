name: Deploy Application

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "both"
        type: choice
        options:
          - both
          - dev
          - release
  push:
    branches:
      - main

jobs:
  # ── Етап 1: Збірка та завантаження Docker-образів ───────────────────────────
  build-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Checkout app repo (develop branch)
        uses: actions/checkout@v4
        with:
          repository: YulianSalo/devops-exam-pt2
          ref: develop

      - name: Build and push develop image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops-exam-app:develop

      - name: Checkout app repo (tag 1.0.0)
        uses: actions/checkout@v4
        with:
          repository: YulianSalo/devops-exam-pt2
          ref: "1.0.0"

      - name: Build and push 1.0.0 image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops-exam-app:1.0.0

  # ── Етап 2: Інфраструктура (Terraform + Ansible Base) ────────────────────────
  provision:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    needs: build-push
    outputs:
      droplet_ip: ${{ steps.get_ip.outputs.droplet_ip }}
    env:
      TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
      TF_VAR_spaces_access_id: ${{ secrets.SPACES_ACCESS_KEY }}
      TF_VAR_spaces_secret_key: ${{ secrets.SPACES_SECRET_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Extract Public Key from Secret
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          PUBLIC_KEY=$(ssh-keygen -y -f private_key.pem)
          echo "public_key=$PUBLIC_KEY" >> $GITHUB_ENV
          rm private_key.pem

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.SPACES_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.SPACES_SECRET_KEY }}"

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve -input=false -var="public_key=${{ env.public_key }}"

      - name: Get Droplet IP
        id: get_ip
        run: |
          DROPLET_IP=$(terraform output -raw droplet_ip)
          echo "DROPLET_IP=$DROPLET_IP" >> $GITHUB_ENV
          echo "droplet_ip=$DROPLET_IP" >> $GITHUB_OUTPUT

      - name: Wait for SSH
        run: |
          until nc -z $DROPLET_IP 22; do
            echo "Waiting for SSH..."
            sleep 5
          done
          sleep 10

      - name: Ansible Base Setup
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > deploy_key_full
          chmod 600 deploy_key_full
          ansible-playbook -i "$DROPLET_IP," \
            --private-key deploy_key_full \
            -u root \
            --ssh-common-args='-o StrictHostKeyChecking=no' \
            ansible/playbook.yml

  # ── Етап 3: Валідація (Dry-run) ────────────────────────────────────────────────
  validate:
    name: Validate Helm Charts
    runs-on: ubuntu-latest
    needs: provision
    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Checkout app repo (for Helm chart)
        uses: actions/checkout@v4
        with:
          repository: YulianSalo/devops-exam-pt2
          ref: main
          path: app-repo

      - name: Helm lint
        run: |
          helm lint app-repo/helm-charts-hello-world -f k8s/values-dev.yaml --set image.repository=${{ secrets.DOCKER_USERNAME }}/devops-exam-app
          helm lint app-repo/helm-charts-hello-world -f k8s/values-release.yaml --set image.repository=${{ secrets.DOCKER_USERNAME }}/devops-exam-app

      - name: Helm Dry-run (Remote)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.provision.outputs.droplet_ip }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ -d /tmp/app-repo ]; then rm -rf /tmp/app-repo; fi
            git clone https://github.com/YulianSalo/devops-exam-pt2.git /tmp/app-repo
            
            helm upgrade --install fediv-dev /tmp/app-repo/helm-charts-hello-world \
              --namespace dev --create-namespace \
              --set image.repository=${{ secrets.DOCKER_USERNAME }}/devops-exam-app \
              --set image.tag=develop \
              --set serviceAccount.create=false \
              --set ingress.enabled=false \
              --set httpRoute.enabled=false \
              --set autoscaling.enabled=false \
              --dry-run

  # ── Етап 4: Реальний Деплой ──────────────────────────────────────────────────
  deploy:
    name: Final Deployment
    runs-on: ubuntu-latest
    needs: [validate, provision]
    steps:
      - name: Deploy to K8s
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.provision.outputs.droplet_ip }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Copy values to VM (quick hack via cat)
            cat > /tmp/values-dev.yaml << 'EOF'
            replicaCount: 1
            image:
              repository: ${{ secrets.DOCKER_USERNAME }}/devops-exam-app
              tag: develop
              pullPolicy: Always
            service:
              type: ClusterIP
              port: 8000
            EOF

            cat > /tmp/values-release.yaml << 'EOF'
            replicaCount: 2
            image:
              repository: ${{ secrets.DOCKER_USERNAME }}/devops-exam-app
              tag: 1.0.0
              pullPolicy: IfNotPresent
            service:
              type: ClusterIP
              port: 8000
            EOF

            # Dev Deployment
            kubectl create namespace dev --dry-run=client -o yaml | kubectl apply -f -
            helm upgrade --install fediv-dev /tmp/app-repo/helm-charts-hello-world \
              --namespace dev -f /tmp/values-dev.yaml \
              --set serviceAccount.create=false \
              --set ingress.enabled=false \
              --set httpRoute.enabled=false \
              --set autoscaling.enabled=false \
              --atomic --timeout 5m

            # Release Deployment
            kubectl create namespace release --dry-run=client -o yaml | kubectl apply -f -
            helm upgrade --install fediv-release /tmp/app-repo/helm-charts-hello-world \
              --namespace release -f /tmp/values-release.yaml \
              --set serviceAccount.create=false \
              --set ingress.enabled=false \
              --set httpRoute.enabled=false \
              --set autoscaling.enabled=false \
              --atomic --timeout 5m

            # Create Systemd Proxies
            cat > /etc/systemd/system/kubectl-pf-dev.service << 'EOF'
            [Unit]
            Description=kubectl port-forward dev on 8002
            After=network.target
            [Service]
            Environment="KUBECONFIG=/root/.kube/config"
            ExecStart=/usr/local/bin/kubectl port-forward -n dev svc/django-hello-world-svc 8002:8000 --address=0.0.0.0
            Restart=always
            User=root
            [Install]
            WantedBy=multi-user.target
            EOF

            cat > /etc/systemd/system/kubectl-pf-release.service << 'EOF'
            [Unit]
            Description=kubectl port-forward release on 8003
            After=network.target
            [Service]
            Environment="KUBECONFIG=/root/.kube/config"
            ExecStart=/usr/local/bin/kubectl port-forward -n release svc/django-hello-world-svc 8003:8000 --address=0.0.0.0
            Restart=always
            User=root
            [Install]
            WantedBy=multi-user.target
            EOF

            systemctl daemon-reload
            systemctl enable kubectl-pf-dev kubectl-pf-release
            systemctl restart kubectl-pf-dev kubectl-pf-release

name: Terraform Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  terraform:
    name: "Terraform Build & Deploy"
    runs-on: ubuntu-latest
    env:
      TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
      TF_VAR_spaces_access_id: ${{ secrets.SPACES_ACCESS_KEY }}
      TF_VAR_spaces_secret_key: ${{ secrets.SPACES_SECRET_KEY }}
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Generate SSH Key
        run: |
          ssh-keygen -t rsa -b 4096 -f deploy_key -N ""
          echo "PUBLIC_KEY=$(cat deploy_key.pub)" >> $GITHUB_ENV

      - name: Check Secrets
        run: |
          if [ -z "${{ secrets.DO_TOKEN }}" ]; then echo "DO_TOKEN is not set"; exit 1; fi
          if [ -z "${{ secrets.SPACES_ACCESS_KEY }}" ]; then echo "SPACES_ACCESS_KEY is not set"; exit 1; fi
          if [ -z "${{ secrets.SPACES_SECRET_KEY }}" ]; then echo "SPACES_SECRET_KEY is not set"; exit 1; fi

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.SPACES_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.SPACES_SECRET_KEY }}"

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -var="public_key=${{ env.PUBLIC_KEY }}"
        continue-on-error: false

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: apply
        run: |
          terraform apply -auto-approve -input=false -var="public_key=${{ env.PUBLIC_KEY }}"
          echo "DROPLET_IP=$(terraform output -raw droplet_ip)" >> $GITHUB_ENV

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Wait for SSH (parametric node)
        if: steps.apply.outcome == 'success'
        run: |
          echo "Waiting for $DROPLET_IP..."
          until nc -z $DROPLET_IP 22; do
            echo "SSH is not available yet, waiting 5 seconds..."
            sleep 5
          done
          echo "SSH is open, waiting another 10s for service to stabilize..."
          sleep 10

      - name: Ansible Dry-Run (Check Mode)
        id: ansible_check
        if: steps.apply.outcome == 'success'
        run: |
          chmod 600 deploy_key
          ansible-playbook -i "$DROPLET_IP," \
            --private-key deploy_key \
            -u root --ssh-common-args='-o StrictHostKeyChecking=no' \
            ansible/playbook.yml --check
        continue-on-error: false

      - name: Ansible Execution (Install Software)
        if: steps.ansible_check.outcome == 'success'
        run: |
          chmod 600 deploy_key
          ansible-playbook -i "$DROPLET_IP," \
            --private-key deploy_key \
            -u root --ssh-common-args='-o StrictHostKeyChecking=no' \
            ansible/playbook.yml

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push (Develop)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git clone https://github.com/YulianSalo/devops-exam-pt2.git app-dev
          cd app-dev && git checkout main # Assuming develop code is here or specifically checkout develop
          docker build -t ${{ secrets.DOCKER_USERNAME }}/exam-app:develop .
          docker push ${{ secrets.DOCKER_USERNAME }}/exam-app:develop

      - name: Build and Push (Release 1.0.0)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git clone https://github.com/YulianSalo/devops-exam-pt2.git app-release
          cd app-release && git checkout tags/1.0.0
          docker build -t ${{ secrets.DOCKER_USERNAME }}/exam-app:1.0.0 .
          docker push ${{ secrets.DOCKER_USERNAME }}/exam-app:1.0.0

      - name: Prepare K8s Manifests
        run: |
          sed -i "s/DOCKER_USERNAME/${{ secrets.DOCKER_USERNAME }}/g" k8s/dev.yaml
          sed -i "s/DOCKER_USERNAME/${{ secrets.DOCKER_USERNAME }}/g" k8s/release.yaml

      - name: K8s Validation (Dry-Run)
        if: steps.ansible_check.outcome == 'success'
        run: |
          ansible all -i "$DROPLET_IP," \
            --private-key deploy_key \
            -u root --ssh-common-args='-o StrictHostKeyChecking=no' \
            -m copy -a "src=k8s/ dest=/root/k8s/"
          
          ansible all -i "$DROPLET_IP," \
            --private-key deploy_key \
            -u root --ssh-common-args='-o StrictHostKeyChecking=no' \
            -a "kubectl apply -f /root/k8s/ --dry-run=client"

      - name: K8s Deployment
        if: steps.ansible_check.outcome == 'success'
        run: |
          ansible all -i "$DROPLET_IP," \
            --private-key deploy_key \
            -u root --ssh-common-args='-o StrictHostKeyChecking=no' \
            -a "kubectl apply -f /root/k8s/"

---
- name: Install DevOps Tools
  hosts: all
  become: yes
  vars:
    minikube_version: "latest"
    helm_version: "latest"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - conntrack
        state: present

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Ensure Docker is started and enabled
      systemd:
        name: docker
        state: started
        enabled: yes
      when: not ansible_check_mode

    - name: Add user to docker group
      user:
        name: root
        groups: docker
        append: yes
      when: not ansible_check_mode

    - name: Download Kubectl
      get_url:
        url: "https://dl.k8s.io/release/{{ lookup('pipe', 'curl -L -s https://dl.k8s.io/release/stable.txt') }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: Download Minikube
      get_url:
        url: https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        dest: /usr/local/bin/minikube
        mode: '0755'

    - name: Install Helm
      shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Install networking tools
      apt:
        name:
          - socat
          - ufw
        state: present

    - name: Install Nginx for stable proxy
      apt:
        name: nginx
        state: present

    - name: Disable firewall in Ubuntu
      ufw:
        state: disabled

    - name: Start Minikube (as root user)
      become: yes
      become_user: root
      shell: |
        minikube start --driver=docker --listen-address=0.0.0.0 --force \
          --extra-config=apiserver.service-node-port-range=8000-9000
      args:
        creates: /root/.minikube/machines/minikube/config.json
      register: minikube_start_result
      ignore_errors: yes
      when: not ansible_check_mode

    - name: Wait for Kubernetes Pods to be ready
      become: yes
      shell: |
        kubectl wait --for=condition=ready pod --all --all-namespaces --timeout=300s
      when: not ansible_check_mode

    - name: Configure Nginx Proxy
      become: yes
      shell: |
        MINIKUBE_IP=$(minikube ip)
        cat <<EOF > /etc/nginx/sites-available/k8s-proxy
        server {
            listen 8002;
            location / {
                proxy_pass http://$MINIKUBE_IP:8002;
                proxy_set_header Host \$host;
            }
        }
        server {
            listen 8003;
            location / {
                proxy_pass http://$MINIKUBE_IP:8003;
                proxy_set_header Host \$host;
            }
        }
        EOF
        ln -sf /etc/nginx/sites-available/k8s-proxy /etc/nginx/sites-enabled/
        rm -f /etc/nginx/sites-enabled/default
        systemctl restart nginx
      when: not ansible_check_mode

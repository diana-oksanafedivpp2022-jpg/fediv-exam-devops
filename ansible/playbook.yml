---
- name: Install DevOps Tools
  hosts: all
  become: yes
  vars:
    minikube_version: "latest"
    helm_version: "latest"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - conntrack
        state: present

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Ensure Docker is started and enabled
      systemd:
        name: docker
        state: started
        enabled: yes
      when: not ansible_check_mode

    - name: Add user to docker group
      user:
        name: root
        groups: docker
        append: yes
      when: not ansible_check_mode

    - name: Download Kubectl
      get_url:
        url: "https://dl.k8s.io/release/{{ lookup('pipe', 'curl -L -s https://dl.k8s.io/release/stable.txt') }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: Download Minikube
      get_url:
        url: https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        dest: /usr/local/bin/minikube
        mode: '0755'

    - name: Install Helm
      shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Install networking tools
      apt:
        name:
          - socat
          - ufw
        state: present

    - name: Clean up networking (Nginx/IPTables)
      shell: |
        systemctl stop nginx || true
        # Clean nat rules
        iptables -t nat -F || true
        iptables -F || true
      ignore_errors: yes

    - name: Start Minikube (as root user)
      become: yes
      become_user: root
      shell: |
        minikube start --driver=docker --listen-address=0.0.0.0 --force \
          --extra-config=apiserver.service-node-port-range=8000-9000
      args:
        creates: /root/.minikube/machines/minikube/config.json
      register: minikube_start_result
      ignore_errors: yes
      when: not ansible_check_mode

    - name: Wait for Kubernetes Pods to be ready
      become: yes
      shell: |
        kubectl wait --for=condition=ready pod --all --all-namespaces --timeout=300s
      when: not ansible_check_mode

    - name: Create Systemd Service for Dev Proxy (8002)
      become: yes
      copy:
        dest: /etc/systemd/system/k8s-dev.service
        content: |
          [Unit]
          Description=K8s Dev Port Forward
          After=network.target

          [Service]
          Environment="KUBECONFIG=/root/.kube/config"
          ExecStart=/usr/local/bin/kubectl port-forward --address 0.0.0.0 svc/exam-app-dev-service 8002:8000
          Restart=always
          User=root

          [Install]
          WantedBy=multi-user.target
      when: not ansible_check_mode

    - name: Create Systemd Service for Release Proxy (8003)
      become: yes
      copy:
        dest: /etc/systemd/system/k8s-release.service
        content: |
          [Unit]
          Description=K8s Release Port Forward
          After=network.target

          [Service]
          Environment="KUBECONFIG=/root/.kube/config"
          ExecStart=/usr/local/bin/kubectl port-forward --address 0.0.0.0 svc/exam-app-release-service 8003:8000
          Restart=always
          User=root

          [Install]
          WantedBy=multi-user.target
      when: not ansible_check_mode

    - name: Enable and Start Proxy Services
      become: yes
      systemd:
        name: "{{ item }}"
        state: restarted
        enabled: yes
        daemon_reload: yes
      loop:
        - k8s-dev
        - k8s-release
      when: not ansible_check_mode

    - name: Diagnose Connectivity Locally
      become: yes
      shell: |
        MINIKUBE_IP=$(minikube ip)
        curl -I http://$MINIKUBE_IP:30002
        curl -I http://$MINIKUBE_IP:30003
      register: diag_res
      ignore_errors: yes
      when: not ansible_check_mode

    - name: Print Diagnosis
      debug:
        msg: "Diagnosis: {{ diag_res.stdout_lines }}"
      when: not ansible_check_mode and diag_res is defined

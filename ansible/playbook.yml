---
- name: Install DevOps Tools
  hosts: all
  become: yes
  vars:
    minikube_version: "latest"
    helm_version: "latest"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - conntrack
        state: present

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Ensure Docker is started and enabled
      systemd:
        name: docker
        state: started
        enabled: yes
      when: not ansible_check_mode

    - name: Add user to docker group
      user:
        name: root
        groups: docker
        append: yes
      when: not ansible_check_mode

    - name: Download Kubectl
      get_url:
        url: "https://dl.k8s.io/release/{{ lookup('pipe', 'curl -L -s https://dl.k8s.io/release/stable.txt') }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: '0755'

    - name: Download Minikube
      get_url:
        url: https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
        dest: /usr/local/bin/minikube
        mode: '0755'

    - name: Install Helm
      shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Install networking tools
      apt:
        name:
          - socat
          - ufw
        state: present

    - name: Enable IPv4 Port Forwarding
      sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        state: present
        reload: yes

    - name: Disable firewall in Ubuntu
      ufw:
        state: disabled

    - name: Remove Nginx to avoid conflicts
      apt:
        name: nginx
        state: absent
        purge: yes

    - name: Start Minikube (as root user)
      become: yes
      become_user: root
      shell: |
        minikube start --driver=docker --listen-address=0.0.0.0 --force \
          --extra-config=apiserver.service-node-port-range=8000-9000
      args:
        creates: /root/.minikube/machines/minikube/config.json
      register: minikube_start_result
      ignore_errors: yes
      when: not ansible_check_mode

    - name: Wait for Kubernetes Pods to be ready
      become: yes
      shell: |
        kubectl wait --for=condition=ready pod --all --all-namespaces --timeout=300s
      when: not ansible_check_mode

    - name: Setup Direct IPTables Forwarding (8002/8003)
      become: yes
      shell: |
        MINIKUBE_IP=$(minikube ip)
        # Clean old rules
        iptables -t nat -D PREROUTING -p tcp --dport 8002 -j DNAT --to-destination $MINIKUBE_IP:8002 || true
        iptables -t nat -D PREROUTING -p tcp --dport 8003 -j DNAT --to-destination $MINIKUBE_IP:8003 || true
        iptables -D FORWARD -p tcp -d $MINIKUBE_IP --dport 8002 -j ACCEPT || true
        iptables -D FORWARD -p tcp -d $MINIKUBE_IP --dport 8003 -j ACCEPT || true

        # Add new rules
        iptables -t nat -A PREROUTING -p tcp --dport 8002 -j DNAT --to-destination $MINIKUBE_IP:8002
        iptables -t nat -A PREROUTING -p tcp --dport 8003 -j DNAT --to-destination $MINIKUBE_IP:8003
        iptables -A FORWARD -p tcp -d $MINIKUBE_IP --dport 8002 -j ACCEPT
        iptables -A FORWARD -p tcp -d $MINIKUBE_IP --dport 8003 -j ACCEPT
        iptables -t nat -A POSTROUTING -j MASQUERADE
      when: not ansible_check_mode

    - name: Diagnose Connectivity Locally
      become: yes
      shell: |
        MINIKUBE_IP=$(minikube ip)
        curl -I http://$MINIKUBE_IP:30002
        curl -I http://$MINIKUBE_IP:30003
      register: diag_res
      ignore_errors: yes
      when: not ansible_check_mode

    - name: Print Diagnosis
      debug:
        msg: "Diagnosis: {{ diag_res.stdout_lines }}"
      when: not ansible_check_mode and diag_res is defined
